<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUCIBLE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400..800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0c10;--surface:#0f1117;--surface2:#161b26;
    --border:#1e2535;--border-bright:#2e3a52;
    --text:#c9d1d9;--dim:#6b7280;--bright:#f0f6fc;
    --split:#3b82f6;--steal:#ef4444;--accent:#8b5cf6;
    --green:#22c55e;--amber:#f59e0b;
    --split-glow:#3b82f620;--steal-glow:#ef444420;
  }
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;
    background-image:linear-gradient(var(--surface2) 1px,transparent 1px),linear-gradient(90deg,var(--surface2) 1px,transparent 1px);
    background-size:40px 40px}

  /* ── LAYOUT ── */
  .app{display:grid;grid-template-rows:auto 1fr auto;height:100vh}

  /* ── HEADER ── */
  .header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--surface)}
  .header-left{display:flex;align-items:center;gap:16px}
  .logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--bright);letter-spacing:4px}
  .logo-sub{font-size:11px;color:var(--dim);letter-spacing:0.5px}
  .header-metrics{display:flex;gap:24px;align-items:center}
  .hm{text-align:center}
  .hm-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
  .hm-lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px}

  /* ── MAIN ── */
  .main{display:grid;grid-template-columns:1fr 2px 1fr;grid-template-rows:1fr auto;overflow:hidden}

  /* ── AGENT PANELS ── */
  .agent-panel{display:flex;flex-direction:column;overflow:hidden}
  .agent-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
  .agent-name{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;display:flex;align-items:center;gap:6px}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
  .dot-a{background:var(--split)}.dot-b{background:var(--steal)}
  .agent-score{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600}

  .agent-body{flex:1;overflow-y:auto;padding:16px 20px}
  .bubble{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:8px;line-height:1.5;max-width:95%;animation:fadeIn .3s ease}
  .bubble.public{background:color-mix(in srgb,var(--text) 5%,transparent);border:1px solid color-mix(in srgb,var(--text) 8%,transparent)}
  .bubble.private{background:color-mix(in srgb,var(--accent) 6%,transparent);border:1px solid color-mix(in srgb,var(--accent) 12%,transparent);font-style:italic;color:var(--dim);font-size:12px;margin-top:12px}
  .bubble.private::before{content:'PRIVATE REFLECTION';font-size:8px;font-weight:700;color:var(--accent);letter-spacing:0.5px;display:block;margin-bottom:4px;font-style:normal}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .voice-btn{display:inline-flex;align-items:center;gap:4px;background:color-mix(in srgb,var(--accent) 10%,transparent);border:1px solid color-mix(in srgb,var(--accent) 20%,transparent);color:var(--accent);padding:4px 10px;border-radius:6px;font-size:10px;font-family:'JetBrains Mono',monospace;cursor:pointer;margin-top:4px;transition:all .15s}
  .voice-btn:hover{background:color-mix(in srgb,var(--accent) 20%,transparent)}
  .voice-btn.playing{background:var(--accent);color:var(--bg)}

  /* ── DIVIDER ── */
  .divider-glow{background:linear-gradient(180deg,transparent,var(--steal),var(--accent),var(--split),transparent);opacity:.3;animation:pulse 3s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.15}50%{opacity:.5}}

  /* ── CHOICE REVEAL ── */
  .reveal-bar{grid-column:1/-1;display:flex;align-items:center;justify-content:center;gap:40px;padding:20px;border-top:1px solid var(--border);background:var(--surface);min-height:80px}
  .flip-card{width:80px;height:110px;perspective:600px;cursor:pointer}
  .flip-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s}
  .flip-card.flipped .flip-inner{transform:rotateY(180deg)}
  .flip-face{position:absolute;inset:0;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:1px;backface-visibility:hidden}
  .flip-front{background:var(--surface2);border:2px solid var(--border);color:var(--dim)}
  .flip-front::after{content:'?';font-size:28px;color:var(--dim)}
  .flip-back{transform:rotateY(180deg);border:2px solid}
  .flip-back.split{background:color-mix(in srgb,var(--split) 12%,transparent);border-color:var(--split);color:var(--split);box-shadow:0 0 24px var(--split-glow)}
  .flip-back.steal{background:color-mix(in srgb,var(--steal) 12%,transparent);border-color:var(--steal);color:var(--steal);box-shadow:0 0 24px var(--steal-glow)}
  .flip-label{font-size:9px;color:var(--dim);text-align:center;margin-top:6px;font-family:'JetBrains Mono',monospace;letter-spacing:1px;text-transform:uppercase}
  .reveal-outcome{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim);max-width:120px;text-align:center;line-height:1.4}
  .reveal-round{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--bright);margin-bottom:4px}

  /* ── FOOTER: TIMELINE + METRICS ── */
  .footer{border-top:1px solid var(--border);background:var(--surface)}
  .footer-tabs{display:flex;border-bottom:1px solid var(--border)}
  .footer-tab{padding:8px 20px;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--dim);cursor:pointer;letter-spacing:0.5px;border-bottom:2px solid transparent;transition:all .15s}
  .footer-tab:hover{color:var(--text)}
  .footer-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

  .footer-content{padding:16px 24px}
  .footer-panel{display:none}
  .footer-panel.active{display:block}

  /* Timeline */
  .timeline{display:flex;gap:1px;height:28px;align-items:stretch;border-radius:4px;overflow:hidden;cursor:pointer}
  .tl-tick{flex:1;min-width:4px;transition:all .1s;position:relative}
  .tl-tick:hover{transform:scaleY(1.4);z-index:1}
  .tl-tick.active{outline:2px solid var(--bright);outline-offset:-1px;z-index:2}
  .tl-tick.coop{background:var(--split);opacity:.6}.tl-tick.coop:hover,.tl-tick.coop.active{opacity:1}
  .tl-tick.ba{background:var(--steal);opacity:.75}
  .tl-tick.bb{background:var(--amber);opacity:.75}
  .tl-tick.md{background:color-mix(in srgb,var(--steal) 65%,#000);opacity:.85}
  .tl-legend{display:flex;gap:14px;font-size:10px;color:var(--dim);margin-top:8px}
  .tl-legend span::before{content:'';display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:4px;vertical-align:middle}
  .l-coop::before{background:var(--split)}.l-ba::before{background:var(--steal)}.l-bb::before{background:var(--amber)}.l-md::before{background:color-mix(in srgb,var(--steal) 65%,#000)}

  /* Metrics */
  .metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .m-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
  .m-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
  .m-lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
  .m-spark{height:36px;display:flex;align-items:flex-end;gap:1px;margin-top:8px;justify-content:center}
  .m-bar{min-width:2px;border-radius:1px;flex:1}

  /* Chart placeholder */
  .chart{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:12px}
  .chart canvas{width:100%;height:100px}

  /* ── LOADING ── */
  .loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:13px}
</style>
</head>
<body>

<div class="app">
  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div>
        <div class="logo">CRUCIBLE</div>
        <div class="logo-sub">Emergent deception in adversarial self-play</div>
      </div>
    </div>
    <div class="header-metrics">
      <div class="hm"><div class="hm-val" style="color:var(--steal)" id="hm-di">--</div><div class="hm-lbl">Deception Index</div></div>
      <div class="hm"><div class="hm-val" style="color:var(--split)" id="hm-coop">--</div><div class="hm-lbl">Cooperation</div></div>
      <div class="hm"><div class="hm-val" style="color:var(--amber)" id="hm-md">--</div><div class="hm-lbl">Mutual Dest.</div></div>
      <div class="hm"><div class="hm-val" id="hm-round">--</div><div class="hm-lbl">Round</div></div>
    </div>
  </div>

  <!-- MAIN: SPLIT SCREEN -->
  <div class="main">
    <div class="agent-panel" id="panel-a">
      <div class="agent-header">
        <div class="agent-name"><span class="dot dot-a"></span> Agent A</div>
        <div class="agent-score" id="score-a">$0</div>
      </div>
      <div class="agent-body" id="body-a"><div class="loading">Load game data...</div></div>
    </div>

    <div class="divider-glow"></div>

    <div class="agent-panel" id="panel-b">
      <div class="agent-header">
        <div class="agent-name"><span class="dot dot-b"></span> Agent B</div>
        <div class="agent-score" id="score-b">$0</div>
      </div>
      <div class="agent-body" id="body-b"><div class="loading">Load game data...</div></div>
    </div>

    <!-- CHOICE REVEAL -->
    <div class="reveal-bar">
      <div>
        <div class="flip-card" id="card-a" onclick="flipCard('a')">
          <div class="flip-inner"><div class="flip-face flip-front"></div><div class="flip-face flip-back" id="card-a-back">?</div></div>
        </div>
        <div class="flip-label">Agent A</div>
      </div>
      <div>
        <div class="reveal-round" id="reveal-round">Round --</div>
        <div class="reveal-outcome" id="reveal-outcome"></div>
      </div>
      <div>
        <div class="flip-card" id="card-b" onclick="flipCard('b')">
          <div class="flip-inner"><div class="flip-face flip-front"></div><div class="flip-face flip-back" id="card-b-back">?</div></div>
        </div>
        <div class="flip-label">Agent B</div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-tabs">
      <div class="footer-tab active" onclick="showTab('timeline')">Timeline</div>
      <div class="footer-tab" onclick="showTab('metrics')">Metrics</div>
    </div>
    <div class="footer-content">
      <div class="footer-panel active" id="tab-timeline">
        <div class="timeline" id="timeline"></div>
        <div class="tl-legend">
          <span class="l-coop">Both Split</span>
          <span class="l-ba">A Betrayed B</span>
          <span class="l-bb">B Betrayed A</span>
          <span class="l-md">Mutual Destruction</span>
        </div>
      </div>
      <div class="footer-panel" id="tab-metrics">
        <div class="metrics-grid" id="metrics-grid"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let gameData = null;
let metricsData = null;
let currentRound = 1;
let currentAudio = null;

// ── DATA LOADING ──
async function loadData() {
  try {
    const [gameResp, metricsResp] = await Promise.all([
      fetch('../data/latest_game.json'),
      fetch('../data/latest_metrics.json'),
    ]);
    gameData = await gameResp.json();
    metricsData = await metricsResp.json();
    init();
  } catch (e) {
    document.getElementById('body-a').innerHTML = '<div class="loading">Failed to load data. Run the engine first.</div>';
    document.getElementById('body-b').innerHTML = '<div class="loading">Check data/latest_game.json exists.</div>';
  }
}

function init() {
  // Header metrics
  document.getElementById('hm-di').textContent = metricsData.deception_index.toFixed(0);
  document.getElementById('hm-coop').textContent = (metricsData.cooperation_rate * 100).toFixed(0) + '%';
  document.getElementById('hm-md').textContent = (metricsData.mutual_destruction_rate * 100).toFixed(0) + '%';

  // Build timeline
  buildTimeline();

  // Build metrics panel
  buildMetrics();

  // Show round 1
  showRound(1);
}

// ── TIMELINE ──
function buildTimeline() {
  const container = document.getElementById('timeline');
  container.innerHTML = '';
  gameData.rounds.forEach((r, i) => {
    const tick = document.createElement('div');
    tick.className = 'tl-tick';

    const ac = r.agent_a_choice, bc = r.agent_b_choice;
    if (ac === 'split' && bc === 'split') tick.classList.add('coop');
    else if (ac === 'steal' && bc === 'split') tick.classList.add('ba');
    else if (ac === 'split' && bc === 'steal') tick.classList.add('bb');
    else tick.classList.add('md');

    tick.title = `Round ${i + 1}`;
    tick.onclick = () => showRound(i + 1);
    container.appendChild(tick);
  });
}

// ── SHOW ROUND ──
function showRound(n) {
  currentRound = n;
  const r = gameData.rounds[n - 1];
  if (!r) return;

  // Update header
  document.getElementById('hm-round').textContent = n + '/' + gameData.rounds.length;
  document.getElementById('score-a').textContent = '$' + r.agent_a_total;
  document.getElementById('score-b').textContent = '$' + r.agent_b_total;

  // Highlight timeline tick
  document.querySelectorAll('.tl-tick').forEach((t, i) => {
    t.classList.toggle('active', i === n - 1);
  });

  // Agent A panel
  const bodyA = document.getElementById('body-a');
  let htmlA = '';
  r.conversation.forEach(([speaker, msg]) => {
    if (speaker === 'A') {
      htmlA += `<div class="bubble public">${escHtml(msg)}</div>`;
    }
  });
  // Voice button for public
  htmlA += makeVoiceBtn(n, 'a', 'public');
  // Private reflection
  if (r.agent_a_reflection) {
    htmlA += `<div class="bubble private">${escHtml(r.agent_a_reflection)}</div>`;
    htmlA += makeVoiceBtn(n, 'a', 'private');
  }
  bodyA.innerHTML = htmlA;

  // Agent B panel
  const bodyB = document.getElementById('body-b');
  let htmlB = '';
  r.conversation.forEach(([speaker, msg]) => {
    if (speaker === 'B') {
      htmlB += `<div class="bubble public">${escHtml(msg)}</div>`;
    }
  });
  htmlB += makeVoiceBtn(n, 'b', 'public');
  if (r.agent_b_reflection) {
    htmlB += `<div class="bubble private">${escHtml(r.agent_b_reflection)}</div>`;
    htmlB += makeVoiceBtn(n, 'b', 'private');
  }
  bodyB.innerHTML = htmlB;

  // Reset flip cards
  resetCards(r);

  // Reveal bar
  document.getElementById('reveal-round').textContent = 'Round ' + n;
  const ac = r.agent_a_choice, bc = r.agent_b_choice;
  let outcome = '';
  if (ac === 'split' && bc === 'split') outcome = 'Both split. $50 each.';
  else if (ac === 'steal' && bc === 'split') outcome = 'A stole. A +$100, B +$0.';
  else if (ac === 'split' && bc === 'steal') outcome = 'B stole. B +$100, A +$0.';
  else outcome = 'Both steal. $0 each.';
  document.getElementById('reveal-outcome').textContent = outcome;
}

function makeVoiceBtn(round, agent, mode) {
  const file = `../data/audio/round_${String(round).padStart(3,'0')}_${agent}_${mode}.mp3`;
  return `<button class="voice-btn" onclick="playVoice(this, '${file}')">&#9654; ${mode}</button>`;
}

// ── VOICE PLAYBACK ──
function playVoice(btn, src) {
  if (currentAudio) { currentAudio.pause(); document.querySelectorAll('.voice-btn.playing').forEach(b => b.classList.remove('playing')); }
  const audio = new Audio(src);
  audio.onerror = () => { btn.textContent = 'no audio'; btn.disabled = true; };
  audio.onended = () => btn.classList.remove('playing');
  btn.classList.add('playing');
  audio.play();
  currentAudio = audio;
}

// ── FLIP CARDS ──
function resetCards(r) {
  const cardA = document.getElementById('card-a');
  const cardB = document.getElementById('card-b');
  cardA.classList.remove('flipped');
  cardB.classList.remove('flipped');
  const backA = document.getElementById('card-a-back');
  const backB = document.getElementById('card-b-back');
  backA.textContent = r.agent_a_choice.toUpperCase();
  backA.className = 'flip-face flip-back ' + r.agent_a_choice;
  backB.textContent = r.agent_b_choice.toUpperCase();
  backB.className = 'flip-face flip-back ' + r.agent_b_choice;
}
function flipCard(agent) {
  document.getElementById('card-' + agent).classList.toggle('flipped');
}

// ── METRICS ──
function buildMetrics() {
  const grid = document.getElementById('metrics-grid');
  const mi = metricsData.mutual_information_series;
  const ent = metricsData.strategy_entropy_series;

  grid.innerHTML = `
    <div class="m-card">
      <div class="m-val" style="color:var(--steal)">${metricsData.deception_index.toFixed(0)}</div>
      <div class="m-lbl">Deception Index</div>
      ${sparkline(mi, 'var(--steal)')}
    </div>
    <div class="m-card">
      <div class="m-val" style="color:var(--split)">${(metricsData.cooperation_rate*100).toFixed(0)}%</div>
      <div class="m-lbl">Cooperation Rate</div>
    </div>
    <div class="m-card">
      <div class="m-val" style="color:var(--accent)">${ent.length ? ent[ent.length-1].toFixed(2) : '--'}</div>
      <div class="m-lbl">Strategy Entropy</div>
      ${sparkline(ent, 'var(--accent)')}
    </div>
    <div class="m-card">
      <div class="m-val" style="color:var(--amber)">${(metricsData.mutual_destruction_rate*100).toFixed(0)}%</div>
      <div class="m-lbl">Mutual Destruction</div>
    </div>
  `;
}

function sparkline(data, color) {
  if (!data || data.length < 2) return '';
  const max = Math.max(...data.map(Math.abs), 0.01);
  const bars = data.map(v => {
    const h = Math.max(2, Math.abs(v) / max * 36);
    return `<div class="m-bar" style="height:${h}px;background:${color};opacity:${0.3 + Math.abs(v)/max*0.7}"></div>`;
  }).join('');
  return `<div class="m-spark">${bars}</div>`;
}

// ── TABS ──
function showTab(name) {
  document.querySelectorAll('.footer-tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase() === name));
  document.querySelectorAll('.footer-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
}

// ── KEYBOARD NAV ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' && currentRound < (gameData?.rounds.length || 1)) showRound(currentRound + 1);
  if (e.key === 'ArrowLeft' && currentRound > 1) showRound(currentRound - 1);
  if (e.key === ' ') { e.preventDefault(); flipCard('a'); setTimeout(() => flipCard('b'), 200); }
});

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── BOOT ──
loadData();
</script>
</body>
</html>
